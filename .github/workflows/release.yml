name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: beamlabstudio-linux-amd64.tar.gz
            ext: tar.gz
          - os: windows-2022
            artifact: beamlabstudio-windows-amd64.zip
            ext: zip
          - os: macos-14
            artifact: beamlabstudio-macos-arm64.tar.gz
            ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Linux ──────────────────────────────────────────────────
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev libgl1-mesa-dev

      # ── macOS ──────────────────────────────────────────────────
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja qt

      # ── Windows ────────────────────────────────────────────────
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja
          # Qt6 is pre-installed on GitHub Actions Windows runners

      # ── Configure ──────────────────────────────────────────────
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBEAMLAB_ENABLE_QT_UI=ON \
            -DBEAMLAB_ENABLE_PERFORMANCE_TESTS=OFF \
            -DBEAMLAB_ENABLE_LTO=ON

      # ── Build ──────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Test ───────────────────────────────────────────────────
      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      # ── Package: Linux ─────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/bin
          cp build/beamlab     dist/bin/
          cp build/beamlab_ui  dist/bin/
          cp -r config/        dist/config/
          cp README.md         dist/
          cp LICENSE           dist/ 2>/dev/null || true
          tar czf ../${{ matrix.artifact }} -C dist .
        working-directory: ${{ github.workspace }}

      # ── Package: Windows ───────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/bin -Force
          Copy-Item "build/Release/beamlab.exe"    "dist/bin/"
          Copy-Item "build/Release/beamlab_ui.exe" "dist/bin/"
          Copy-Item -Recurse "config"               "dist/config/"
          Copy-Item "README.md"                     "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "${{ matrix.artifact }}"

      # ── Package: macOS ─────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/BeamLabStudio.app/Contents/MacOS
          cp build/beamlab     dist/BeamLabStudio.app/Contents/MacOS/
          cp build/beamlab_ui  dist/BeamLabStudio.app/Contents/MacOS/
          cp -r config/        dist/BeamLabStudio.app/Contents/Resources/config/
          cp README.md         dist/BeamLabStudio.app/Contents/
          tar czf ../${{ matrix.artifact }} -C dist BeamLabStudio.app
        working-directory: ${{ github.workspace }}

      # ── Upload artifact ─────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          find artifacts -type f -name '*.tar.gz' -o -name '*.zip' | while read f; do
            mv "$f" .
          done

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" > CHANGELOG.md
            git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)" \
              | sed 's|#\([0-9]\+\)|[#\1](https://github.com/${{ github.repository }}/issues/\1)|g' \
              >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
          fi
          echo "" >> CHANGELOG.md
          echo "**Full Changelog:** https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            beamlabstudio-linux-amd64.tar.gz
            beamlabstudio-windows-amd64.zip
            beamlabstudio-macos-arm64.tar.gz
          draft: true
          generate_release_notes: false
